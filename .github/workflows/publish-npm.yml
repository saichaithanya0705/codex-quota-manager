name: Publish to npm

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js for npm registry
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Ensure npm is new enough for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Verify release tag matches package version
        shell: bash
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "v${PKG_VERSION}" != "${{ github.event.release.tag_name }}" ]; then
            echo "Release tag ${{ github.event.release.tag_name }} does not match package.json version v${PKG_VERSION}" >&2
            exit 1
          fi

      - name: Check whether version is already published
        id: published
        shell: bash
        run: |
          PKG_NAME="$(node -p "require('./package.json').name")"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${PKG_NAME}@${PKG_VERSION} is already on npm. Skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.published.outputs.already_published != 'true'
        run: npm ci

      - name: Build
        if: steps.published.outputs.already_published != 'true'
        run: npm run build

      - name: Test
        if: steps.published.outputs.already_published != 'true'
        run: npm test

      - name: Publish package
        if: steps.published.outputs.already_published != 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
